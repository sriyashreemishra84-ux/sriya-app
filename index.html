<!DOCTYPE html>
<html>
<head>
    <title>Sriya Numerology App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0A1B4D; font-family: Georgia, serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        const C = {
          bg: "#0A1B4D",
          mid: "#1A2F6A",
          gold: "#C9943A",
          paleGold: "#FFFFFF",
          red: "#1A3A8F",
          border: "#4A6FBF",
          highlight: "#243D80",
        };
        
        const inputStyle = {
          background: "#FFFFFF", border: `1.5px solid ${C.border}`, color: "#0A1B4D",
          padding: "10px 14px", borderRadius: 6, width: "100%", fontSize: 14,
          outline: "none", fontFamily: "Georgia, serif", boxSizing: "border-box",
        };
        const labelStyle = {
          color: "#C9943A", fontSize: 12, fontWeight: "bold",
          letterSpacing: 1, marginBottom: 4, display: "block", fontFamily: "Georgia, serif"
        };
        const btnStyle = (disabled) => ({
          background: disabled ? C.border : C.gold,
          color: disabled ? "#FFFFFF" : "#0A1B4D",
          border: "none", padding: "12px 28px", borderRadius: 6,
          cursor: disabled ? "not-allowed" : "pointer",
          fontWeight: "bold", fontSize: 14, fontFamily: "Georgia, serif", letterSpacing: 1,
          transition: "all 0.2s",
        });

        const PYTH = {
          A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,
          J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,
          S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8
        };
        const CHALD = {
          A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,
          J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,R:2,
          S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7
        };
        const VOWELS = new Set(["A","E","I","O","U"]);

        function reduce(n) {
          if (n === 11 || n === 22 || n === 33) return n;
          while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
            n = String(n).split("").reduce((a,d) => a + parseInt(d), 0);
            if (n === 11 || n === 22 || n === 33) break;
          }
          return n;
        }
        function nameValue(name, chart) {
          return name.toUpperCase().replace(/[^A-Z]/g,"").split("").reduce((s,c) => s + (chart[c]||0), 0);
        }
        function vowelValue(name, chart) {
          return name.toUpperCase().replace(/[^A-Z]/g,"").split("").filter(c => VOWELS.has(c)).reduce((s,c) => s + (chart[c]||0), 0);
        }
        function consonantValue(name, chart) {
          return name.toUpperCase().replace(/[^A-Z]/g,"").split("").filter(c => !VOWELS.has(c)).reduce((s,c) => s + (chart[c]||0), 0);
        }
        function calcNumbers(name, dob) {
          const [dd, mm, yyyy] = dob.split("/").map(Number);
          const rDay = reduce(dd), rMon = reduce(mm);
          const rYear = reduce(yyyy.toString().split("").reduce((a,d)=>a+parseInt(d),0));
          const lp = reduce(rDay + rMon + rYear);
          const birthday = reduce(dd);
          const destPy = reduce(nameValue(name, PYTH));
          const destCh = reduce(nameValue(name, CHALD));
          const soulPy = reduce(vowelValue(name, PYTH));
          const soulCh = reduce(vowelValue(name, CHALD));
          const persPy = reduce(consonantValue(name, PYTH));
          const persCh = reduce(consonantValue(name, CHALD));
          const maturity = reduce(lp + destPy);
          const curYear = new Date().getFullYear();
          const personalYear = reduce(rDay + rMon + reduce(String(curYear).split("").reduce((a,d)=>a+parseInt(d),0)));
          return { lp, birthday, destPy, destCh, soulPy, soulCh, persPy, persCh, maturity, personalYear };
        }

        function Badge({ number, label }) {
          return (
            <div style={{ display: "flex", alignItems: "center", gap: 10,
              background: "#FFFFFF", border: `1.5px solid ${C.gold}`, borderRadius: 8, padding: "8px 16px",
              boxShadow: "0 2px 8px #0A1B4D33" }}>
              <span style={{ fontSize: 28, fontWeight: "bold", color: C.gold, fontFamily: "Georgia, serif" }}>{number}</span>
              <span style={{ fontSize: 11, color: C.bg, fontFamily: "Georgia, serif", letterSpacing: 0.5, fontWeight: "bold" }}>{label}</span>
            </div>
          );
        }
        
        function NumerologyApp() {
          const [step, setStep] = useState("form");
          const [formData, setFormData] = useState({ name: "", dob: "", tob: "", pob: "" });
          const [numbers, setNumbers] = useState(null);
          const [error, setError] = useState("");

          function handleChange(e) { setFormData(f => ({ ...f, [e.target.name]: e.target.value })); }

          function handleConfirm() {
            if (!formData.name || !formData.dob) { setError("Name and date of birth are required."); return; }
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(formData.dob)) { setError("Date format must be DD/MM/YYYY"); return; }
            setError("");
            const nums = calcNumbers(formData.name, formData.dob);
            setNumbers(nums);
            setStep("result");
          }

          if (step === "form") {
            return (
              <div style={{ background: C.bg, minHeight: "100vh", padding: 20, color: "#fff" }}>
                <h1 style={{ color: C.gold, textAlign: "center" }}>Sriya Numerology</h1>
                <div style={{ maxWidth: 400, margin: "0 auto", background: C.mid, padding: 20, borderRadius: 8 }}>
                  <label style={labelStyle}>FULL NAME</label>
                  <input style={inputStyle} name="name" value={formData.name} onChange={handleChange} placeholder="Enter your name" />
                  <br/><br/>
                  <label style={labelStyle}>DATE OF BIRTH DD/MM/YYYY</label>
                  <input style={inputStyle} name="dob" value={formData.dob} onChange={handleChange} placeholder="01/01/2000" />
                  <br/><br/>
                  {error && <div style={{ color: "red", marginBottom: 10 }}>{error}</div>}
                  <button style={btnStyle(false)} onClick={handleConfirm}>CALCULATE</button>
                </div>
              </div>
            );
          }

          return (
            <div style={{ background: C.bg, minHeight: "100vh", padding: 20, color: "#fff" }}>
              <h1 style={{ color: C.gold, textAlign: "center" }}>Your Numbers</h1>
              <div style={{ maxWidth: 600, margin: "0 auto", background: C.mid, padding: 20, borderRadius: 8 }}>
                <h2 style={{ color: C.gold }}>{formData.name}</h2>
                <p>DOB: {formData.dob}</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 20 }}>
                  <Badge number={numbers.lp} label="Life Path" />
                  <Badge number={numbers.destPy} label="Destiny" />
                  <Badge number={numbers.soulPy} label="Soul Urge" />
                  <Badge number={numbers.persPy} label="Personality" />
                  <Badge number={numbers.birthday} label="Birthday" />
                  <Badge number={numbers.maturity} label="Maturity" />
                </div>
                <br/>
                <button style={btnStyle(false)} onClick={() => setStep("form")}>BACK</button>
                <p style={{ fontSize: 12, marginTop: 20, color: C.paleGold }}>
                  Note: AI interpretation disabled for GitHub Pages demo.
                </p>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NumerologyApp />);
    </script>
</body>
</html>
